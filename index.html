<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة آلاء منير</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Tahoma', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .profile-img {
      display: block;
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      margin: 20px auto;
      border: 5px solid #667eea;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }
    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }
    p {
      text-align: center;
      line-height: 1.8;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>أهلاً بيك في منصة آلاء منير</h1>
    
    <!-- الصورة الرئيسية -->
    <img src="ss.png" alt="آلاء منير" class="profile-img">
    
    <p>مرحباً! ده الموقع الرسمي للمنصة</p>
    
    <!-- معرض الصور -->
    <div class="gallery">
      <img src="nn.png" alt="صورة 1">
      <img src="w.jpg" alt="صورة 2">
    </div>
  </div>

  <!-- شيلت السكربت بتاع service worker مؤقتاً عشان ما يبوظ الصفحة -->
</body>
</html>
